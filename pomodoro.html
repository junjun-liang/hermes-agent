<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; media-src 'self';">
<style>
  :root {
    --work: #e74c3c;
    --break: #2ecc71;
    --bg: #0f1419;
    --card: #1a1f2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg);
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    transition: background 0.5s;
  }
  body.break { --bg: #0a1a10; }
  .card {
    background: var(--card);
    border-radius: 32px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .timer-ring {
    position: relative;
    width: 240px;
    height: 240px;
    margin: 0 auto 28px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
  }
  .timer-ring .bg-circle {
    fill: none;
    stroke: rgba(255,255,255,0.06);
    stroke-width: 10;
  }
  .timer-ring .progress {
    fill: none;
    stroke: var(--work);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.5s;
  }
  body.break .timer-ring .progress { stroke: var(--break); }
  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .time-text {
    font-size: 56px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }
  .phase-label {
    font-size: 14px;
    color: #8b949e;
    margin-top: 4px;
    letter-spacing: 2px;
  }
  .buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }
  button {
    padding: 10px 28px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  button:active { transform: scale(0.96); }
  .btn-start {
    background: var(--work);
    color: #fff;
    min-width: 100px;
  }
  body.break .btn-start { background: var(--break); }
  .btn-start:hover { filter: brightness(1.15); }
  .btn-reset {
    background: rgba(255,255,255,0.08);
    color: #aaa;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .stats {
    display: flex;
    gap: 24px;
    justify-content: center;
  }
  .stat {
    color: #8b949e;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .stat span {
    display: block;
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="timer-ring">
    <svg width="240" height="240" viewBox="0 0 240 240">
      <circle class="bg-circle" cx="120" cy="120" r="110"/>
      <circle class="progress" id="progress" cx="120" cy="120" r="110"
              stroke-dasharray="691.15" stroke-dashoffset="0"/>
    </svg>
    <div class="time-display">
      <div class="time-text" id="timeText">25:00</div>
      <div class="phase-label" id="phaseLabel">专注</div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn-start" id="btnStart">开始</button>
    <button class="btn-reset" id="btnReset">重置</button>
  </div>

  <div class="stats">
    <div class="stat">✅ 完成<span id="countDone">0</span></div>
    <div class="stat">⏱ 总专注<span id="totalFocus">0m</span></div>
  </div>
</div>

<script>
(function() {
  // --- Config ---
  const WORK_MIN = 25;
  const BREAK_MIN = 5;
  const WORK_SEC = WORK_MIN * 60;
  const BREAK_SEC = BREAK_MIN * 60;
  const CIRCUMFERENCE = 2 * Math.PI * 110; // ~691.15

  // --- State ---
  let work = true;           // true=work, false=break
  let remaining = WORK_SEC;
  let totalSec = WORK_SEC;
  let running = false;
  let intervalId = null;
  let doneCount = 0;
  let totalFocusMin = 0;

  // --- DOM refs ---
  const timeText = document.getElementById('timeText');
  const phaseLabel = document.getElementById('phaseLabel');
  const btnStart = document.getElementById('btnStart');
  const btnReset = document.getElementById('btnReset');
  const progress = document.getElementById('progress');
  const countDone = document.getElementById('countDone');
  const totalFocus = document.getElementById('totalFocus');
  const body = document.body;

  // --- Audio ---
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function beep(freq, dur, vol) {
    if (!audioCtx) return;
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function notifyEnd() {
    beep(880, 0.15, 0.2);
    setTimeout(function() { beep(1100, 0.15, 0.2); }, 200);
    setTimeout(function() { beep(1320, 0.2, 0.2); }, 400);
  }

  // --- Format ---
  function fmt(sec) {
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  // --- Render ---
  function render() {
    timeText.textContent = fmt(remaining);
    var offset = CIRCUMFERENCE * (1 - remaining / totalSec);
    progress.setAttribute('stroke-dashoffset', offset);
    countDone.textContent = doneCount;
    totalFocus.textContent = totalFocusMin + 'm';
  }

  // --- Phase switch ---
  function switchPhase() {
    work = !work;
    if (work) {
      remaining = WORK_SEC;
      totalSec = WORK_SEC;
      phaseLabel.textContent = '专注';
      body.classList.remove('break');
      btnStart.style.background = '';
    } else {
      remaining = BREAK_SEC;
      totalSec = BREAK_SEC;
      phaseLabel.textContent = '休息';
      body.classList.add('break');
      doneCount++;
      totalFocusMin += WORK_MIN;
    }
    render();
  }

  // --- Tick ---
  function tick() {
    remaining--;
    render();
    if (remaining <= 0) {
      stop();
      notifyEnd();
      switchPhase();
    }
  }

  function stop() {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    running = false;
    btnStart.textContent = '开始';
  }

  // --- Events ---
  btnStart.addEventListener('click', function() {
    initAudio();
    if (running) {
      stop();
    } else {
      running = true;
      btnStart.textContent = '暂停';
      intervalId = setInterval(tick, 1000);
    }
  });

  btnReset.addEventListener('click', function() {
    stop();
    work = true;
    remaining = WORK_SEC;
    totalSec = WORK_SEC;
    phaseLabel.textContent = '专注';
    body.classList.remove('break');
    btnStart.style.background = '';
    render();
  });

  // Keyboard: Space = toggle
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      btnStart.click();
    }
  });

  // Init
  render();
})();
</script>
</body>
</html>
