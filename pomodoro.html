<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .session-type {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .timer {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
        }

        .timer-ring {
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            fill: none;
            stroke-width: 8;
        }

        .timer-ring .bg {
            stroke: #e0e0e0;
        }

        .timer-ring .progress {
            stroke: #e74c3c;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .timer-ring .progress.break {
            stroke: #27ae60;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: 700;
            color: #333;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.5);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .settings {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .setting-item {
            text-align: center;
        }

        .setting-item label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .setting-item input {
            width: 60px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mode-toggle {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .mode-btn {
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 20px;
            background: #f5f5f5;
            color: #666;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 番茄钟</h1>
        <p class="session-type" id="sessionType">专注时间</p>
        
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="work" onclick="setMode('work')">专注</button>
            <button class="mode-btn" data-mode="shortBreak" onclick="setMode('shortBreak')">短休息</button>
            <button class="mode-btn" data-mode="longBreak" onclick="setMode('longBreak')">长休息</button>
        </div>

        <div class="timer">
            <svg class="timer-ring" width="220" height="220">
                <circle class="bg" cx="110" cy="110" r="100"></circle>
                <circle class="progress" id="progress" cx="110" cy="110" r="100" 
                        stroke-dasharray="628.3" stroke-dashoffset="0"></circle>
            </svg>
            <div class="time-display" id="timeDisplay">25:00</div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn" onclick="toggleTimer()">开始</button>
            <button class="btn-secondary" onclick="resetTimer()">重置</button>
        </div>

        <div class="settings">
            <div class="setting-item">
                <label>专注 (分钟)</label>
                <input type="number" id="workTime" value="25" min="1" max="120" onchange="updateSettings()">
            </div>
            <div class="setting-item">
                <label>短休息 (分钟)</label>
                <input type="number" id="shortBreakTime" value="5" min="1" max="30" onchange="updateSettings()">
            </div>
            <div class="setting-item">
                <label>长休息 (分钟)</label>
                <input type="number" id="longBreakTime" value="15" min="1" max="60" onchange="updateSettings()">
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="pomodoroCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalTime">0</div>
                <div class="stat-label">总分钟</div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Timer state
        let timer = null;
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let isRunning = false;
        let currentMode = 'work';
        let pomodoroCount = 0;
        let totalFocusTime = 0;

        // Settings
        let settings = {
            work: 25,
            shortBreak: 5,
            longBreak: 15
        };

        // Audio context for notifications
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, duration, type = 'sine') {
            if (!audioContext) return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function playNotification() {
            initAudio();
            playSound(523.25, 0.2);
            setTimeout(() => playSound(659.25, 0.2), 200);
            setTimeout(() => playSound(783.99, 0.3), 400);
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timeDisplay').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Update progress ring
            const circumference = 2 * Math.PI * 100;
            const progress = (totalTime - timeLeft) / totalTime;
            const offset = circumference * (1 - progress);
            document.getElementById('progress').style.strokeDashoffset = offset;
            
            // Update page title
            document.title = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} - 番茄钟`;
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            initAudio();
            isRunning = true;
            document.getElementById('startBtn').textContent = '暂停';
            
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    if (currentMode === 'work') {
                        totalFocusTime++;
                    }
                    updateDisplay();
                } else {
                    completeSession();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            document.getElementById('startBtn').textContent = '继续';
            clearInterval(timer);
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            document.getElementById('startBtn').textContent = '开始';
            
            const times = {
                work: settings.work,
                shortBreak: settings.shortBreak,
                longBreak: settings.longBreak
            };
            
            timeLeft = times[currentMode] * 60;
            totalTime = timeLeft;
            updateDisplay();
        }

        function completeSession() {
            clearInterval(timer);
            isRunning = false;
            playNotification();
            
            if (currentMode === 'work') {
                pomodoroCount++;
                document.getElementById('pomodoroCount').textContent = pomodoroCount;
                document.getElementById('totalTime').textContent = Math.floor(totalFocusTime / 60);
                showNotification('🍅 专注完成！休息一下吧');
                
                // Auto switch to break
                if (pomodoroCount % 4 === 0) {
                    setMode('longBreak');
                } else {
                    setMode('shortBreak');
                }
            } else {
                showNotification('⚡ 休息结束！开始新的专注');
                setMode('work');
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            
            const modeNames = {
                work: '专注时间',
                shortBreak: '短休息',
                longBreak: '长休息'
            };
            document.getElementById('sessionType').textContent = modeNames[mode];
            
            const progress = document.getElementById('progress');
            progress.classList.toggle('break', mode !== 'work');
            
            resetTimer();
        }

        function updateSettings() {
            settings.work = parseInt(document.getElementById('workTime').value) || 25;
            settings.shortBreak = parseInt(document.getElementById('shortBreakTime').value) || 5;
            settings.longBreak = parseInt(document.getElementById('longBreakTime').value) || 15;
            
            if (!isRunning) {
                resetTimer();
            }
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Request notification permission
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
